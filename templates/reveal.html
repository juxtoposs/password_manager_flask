{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-2">Password Revealed</h1>
        <p class="text-muted mb-3">This was shown only after your request.</p>
        <div class="mb-3">
          <div class="small text-muted">Title</div>
          <div class="fw-semibold">{{ entry.title }}</div>
        </div>
        <div class="mb-3">
          <div class="small text-muted">Password</div>
          <div class="input-group">
            <input class="form-control" id="revealedPassword" value="{{ password }}" readonly>
            <button class="btn btn-outline-primary" type="button" onclick="copyPassword()">Copy</button>
          </div>
        </div>
        <a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Back to Vault</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function copyPassword() {
  const field = document.getElementById('revealedPassword');
  field.select();
  field.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(field.value);
}
</script>
{% endblock %}
